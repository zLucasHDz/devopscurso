name: 'Pipeline 04/07/26'

on:
  # Habilita botão na interface Web para acionar manualmente a pipeline
  push:
    branches: 
      - main
  workflow_dispatch:

jobs:
  integracao:
    name: 'Integração'
    runs-on: ubuntu-latest
    steps:
      # Equivalente a git clone
      - uses: actions/checkout@v4
      - name: 'Instalação de dependências'
        run: pip install -r requirements.txt
      - name: 'Testes unitários'
        run: pytest
      - name: 'Cobertura de código'
        run: pytest --cov --cov-fail-under=80
      - name: 'Análise estática'
        run: bandit -r app/
      - name: 'Linting'
        run: pylint app/ || true
  entrega:
    needs: integracao
    name: 'Entrega'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Autenticação"
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: "Configurando QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "Configurando buildx"
        uses: docker/setup-buildx-action@v3
      - name: "Build e push"
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/curso-devops:latest